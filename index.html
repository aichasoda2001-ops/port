<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Mon Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Barre de Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><span>ASTOU.</span></a>
            <ul class="nav-links">
                <li><a href="https://aichasoda2001-ops.github.io/portof/">A propos</a></li>
                <li><a href="https://aichasoda2001-ops.github.io/porto/">Projets</a></li>
                <li><a href="https://aichasoda2001-ops.github.io/port/" class="active">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Section Contact -->
    <main class="contact-section">
        <div class="contact-container">
            <form action="https://formsubmit.co" method="POST" class="contact-form">
                <h2>Contactez-moi</h2>
                <p>Envoyez-moi un message pour discuter de votre projet.</p>
                
                <div class="input-group">
                    <label for="name">Nom complet</label>
                    <input type="text" name="name" id="name" placeholder="Ex: Aissatou" required>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="votre@email.com" required>
                </div>

                <div class="input-group">
                    <label for="message">Message</label>
                    <textarea name="message" id="message" rows="5" placeholder="Votre message..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">Envoyer le message</button>
            </form>
        </div>
    </main>

</body>
</html>
